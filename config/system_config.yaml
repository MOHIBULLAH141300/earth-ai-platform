system:
  name: "EarthAI Platform"
  version: "1.0.0"
  environment: "development"
  
data:
  sources:
    google_earth_engine:
      project_id: "${EARTHAI_GEE_PROJECT_ID}"
      enabled: true
    sentinel_hub:
      client_id: "${EARTHAI_SENTINEL_CLIENT_ID}"
      client_secret: "${EARTHAI_SENTINEL_CLIENT_SECRET}"
      enabled: true
    modis:
      enabled: true
    nasa_earth_data:
      token: "${EARTHAI_NASA_TOKEN}"
      enabled: true
    openstreetmap:
      enabled: true
  
  preprocessing:
    default_resolution: 30  # meters
    crs: "EPSG:4326"
    normalization_method: "standard"
    missing_value_strategy: "interpolation"
    
  storage:
    cloud_provider: "aws"  # aws, gcp, azure
    bucket_name: "earth-ai-data"
    local_cache_dir: "./data/cache"

models:
  registry:
    path: "./models/registry"
    backend: "mlflow"  # mlflow, wandb, local
    
  training:
    default_framework: "pytorch"
    batch_size: 32
    epochs: 100
    learning_rate: 0.001
    early_stopping_patience: 10
    validation_split: 0.2
    
  hyperparameter_optimization:
    method: "optuna"  # optuna, ray, hyperopt
    n_trials: 100
    timeout: 3600
    
  auto_ml:
    enabled: true
    max_models: 50
    time_budget: 3600
    
  ensemble:
    methods: ["stacking", "voting", "blending"]
    meta_learner: "logistic_regression"

reinforcement_learning:
  environment:
    type: "custom"
    max_steps: 1000
    reward_function: "accuracy_based"
  
  agent:
    algorithm: "PPO"
    learning_rate: 0.0003
    gamma: 0.99
    buffer_size: 100000
    
  training:
    total_timesteps: 1000000
    eval_freq: 10000

expert_system:
  knowledge_base:
    path: "./data/knowledge_base"
    format: "json"
  
  inference:
    engine: "forward_chaining"
    confidence_threshold: 0.7

fuzzy_logic:
  membership_functions:
    type: "triangular"
    ranges:
      low: [0, 0, 0.5]
      medium: [0, 0.5, 1]
      high: [0.5, 1, 1]
  
  defuzzification:
    method: "centroid"

probabilistic_models:
  bayesian_networks:
    inference_method: "variable_elimination"
    learning_algorithm: "maximum_likelihood"
  
  markov_networks:
    inference_method: "belief_propagation"
    learning_algorithm: "pseudo_likelihood"

symbolic_ai:
  knowledge_representation:
    format: "rdf"
    ontology: "geo-spatial"
  
  reasoning:
    engine: "prolog"
    rules_file: "./data/rules.pl"

api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  cors_origins: ["*"]
  
  authentication:
    method: "jwt"
    secret_key: "${EARTHAI_API_SECRET_KEY}"
    algorithm: "HS256"
    access_token_expire_minutes: 30
    
  rate_limiting:
    enabled: true
    requests_per_minute: 100

monitoring:
  metrics:
    enabled: true
    endpoint: "/metrics"
    
  logging:
    level: "INFO"
    format: "json"
    output: "stdout"
    
  tracing:
    enabled: true
    backend: "jaeger"
    
  alerting:
    enabled: true
    channels: ["email", "slack"]
    thresholds:
      error_rate: 0.05
      latency_p95: 1000  # ms
      disk_usage: 0.85
      memory_usage: 0.9

deployment:
  method: "docker"  # docker, kubernetes, serverless
  
  scaling:
    min_replicas: 2
    max_replicas: 10
    target_cpu_utilization: 70
    
  resources:
    cpu_request: "2"
    cpu_limit: "4"
    memory_request: "8Gi"
    memory_limit: "16Gi"
    gpu:
      enabled: true
      type: "nvidia-tesla-t4"
      count: 1

feature_flags:
  enable_real_time_inference: true
  enable_model_retraining: true
  enable_a_b_testing: false
  enable_explainability: true
  enable_drift_detection: true
  enable_auto_scaling: true
