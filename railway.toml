[build]
builder = "dockerfile"

[deploy]
healthcheckPath = "/api/system/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Environment variables that Railway should set
[env]
ENVIRONMENT = "production"
SECRET_KEY = { generateValue = true }

# Service-specific settings
[[services]]
id = "api"
source = "Dockerfile"
ports = ["8000"]

[[services]]
id = "frontend"
source = "Dockerfile.frontend"
ports = ["80"]

[[services]]
id = "postgres"
image = "postgres:15-alpine"
ports = ["5432"]

[[services]]
id = "redis"
image = "redis:7-alpine"
ports = ["6379"]